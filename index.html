<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aasiriyar ELT - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        .letter-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
    <script>
        async function loadData() {
            try {
                const response = await fetch('aasiriyar-data.json');
                const data = await response.json();
                
                // Update User Info
                document.querySelector('p.text-indigo-100').textContent = `வணக்கம், ${data.user.name}`;
                document.querySelector('.bg-white\\/20').textContent = `Lvl ${data.user.level} • ${data.user.rank}`;
                
                // Update Progress
                const progress = data.curriculum.weeklyProgress;
                document.querySelector('.text-3xl.font-bold').textContent = `${progress}%`;
                document.querySelector('.bg-white.h-1\\.5').style.width = `${progress}%`;
                document.querySelector('.text-right p.font-medium').textContent = new Date(data.curriculum.completionDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

                // Update Module Title
                document.querySelector('.text-lg.font-bold.text-gray-800').textContent = data.curriculum.currentModule;

                // Update History Count
                const historyBtn = document.querySelector('button:contains("History")');
                if (historyBtn) {
                    historyBtn.textContent = `History (${data.history.conceptsMastered.length})`;
                }
            } catch (e) {
                console.error("Failed to load data", e);
            }
        }
        window.onload = loadData;

        // Simple helper for selector
        if (!Element.prototype.matches) {
            Element.prototype.matches = Element.prototype.msMatchesSelector || Element.prototype.webkitMatchesSelector;
        }
        // Polyfill for :contains or manual find
        document.addEventListener('DOMContentLoaded', () => {
             const buttons = document.querySelectorAll('button');
             buttons.forEach(btn => {
                 if (btn.textContent.includes('History')) {
                     btn.id = 'history-btn';
                 }
             });
        });
    </script>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
        <!-- Header / User Info -->
        <div class="p-6 bg-gradient-to-br from-indigo-600 to-violet-700 text-white">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h1 class="text-2xl font-bold">Aasiriyar ELT</h1>
                    <p class="text-indigo-100 opacity-90">வணக்கம், Sarankan</p>
                </div>
                <div class="bg-white/20 px-3 py-1 rounded-full text-sm font-semibold">
                    Lvl 1 • மாணவர்
                </div>
            </div>
            
            <div class="mt-6 flex items-end justify-between">
                <div>
                    <p class="text-xs uppercase tracking-wider text-indigo-200 font-semibold mb-1">Weekly Velocity</p>
                    <p class="text-3xl font-bold">50%</p>
                </div>
                <div class="text-right">
                    <p class="text-xs opacity-70">Mastery Target</p>
                    <p class="font-medium text-sm">March 23, 2026</p>
                </div>
            </div>
            <!-- Simple Progress Bar -->
            <div class="w-full bg-indigo-900/30 rounded-full h-1.5 mt-4">
                <div class="bg-white h-1.5 rounded-full" style="width: 50%"></div>
            </div>
        </div>

        <!-- Current Module Section -->
        <div class="p-6">
            <h2 class="text-gray-500 text-xs font-bold uppercase tracking-widest mb-4">Current Module</h2>
            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100">
                <p class="text-lg font-bold text-gray-800">Module 1: The Soul Sounds (Uyir)</p>
                <p class="text-sm text-gray-500 mt-1 italic">Building your phonetic foundation.</p>
                
                <div class="mt-6 grid grid-cols-4 gap-3">
                    <!-- Mastered -->
                    <div class="bg-green-100 border border-green-200 rounded-xl p-3 flex flex-col items-center justify-center opacity-100 grayscale-0">
                        <span class="text-2xl font-bold text-green-700">அ</span>
                        <span class="text-[10px] text-green-600 font-bold mt-1 uppercase">A</span>
                    </div>
                    <div class="bg-green-100 border border-green-200 rounded-xl p-3 flex flex-col items-center justify-center">
                        <span class="text-2xl font-bold text-green-700">ஆ</span>
                        <span class="text-[10px] text-green-600 font-bold mt-1 uppercase">AA</span>
                    </div>
                    <!-- Current Target -->
                    <div class="bg-indigo-600 border border-indigo-700 rounded-xl p-3 flex flex-col items-center justify-center ring-4 ring-indigo-100 letter-card">
                        <span class="text-2xl font-bold text-white">இ</span>
                        <span class="text-[10px] text-indigo-100 font-bold mt-1 uppercase">I</span>
                    </div>
                    <!-- Locked / Next -->
                    <div class="bg-gray-100 border border-gray-200 rounded-xl p-3 flex flex-col items-center justify-center opacity-40">
                        <span class="text-2xl font-bold text-gray-400">ஈ</span>
                        <span class="text-[10px] text-gray-400 font-bold mt-1 uppercase">II</span>
                    </div>
                </div>
            </div>

            <!-- Next Steps -->
            <div class="mt-8 space-y-4">
                <button class="w-full py-4 px-6 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold transition-all shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                    <span>Start Macro-Module 1 (Part 2)</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                    </svg>
                </button>
                <div class="flex gap-3">
                    <button class="flex-1 py-3 px-4 bg-gray-50 text-gray-600 rounded-xl text-sm font-semibold border border-gray-100 hover:bg-gray-100 transition-colors">History</button>
                    <button class="flex-1 py-3 px-4 bg-gray-50 text-gray-600 rounded-xl text-sm font-semibold border border-gray-100 hover:bg-gray-100 transition-colors">Stats</button>
                </div>
            </div>
        </div>

        <!-- Bottom Status -->
        <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">System Live</span>
            </div>
            <span class="text-[10px] text-gray-400 font-medium">Aasiriyar.ai v1.0 • Macro-Sprint active</span>
        </div>
    </div>
</body>
</html>
